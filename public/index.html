<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Weather Forecast</title>
    <link rel="stylesheet" href="/styles.css" />
    <!-- Leaflet CSS from node_modules -->
    <link rel="stylesheet" href="/leaflet.css" />
  </head>
  <body>
    <div class="container app">
      <header class="app-header">
        <h1>
          <img src="/logo.svg" alt="Weather logo" class="site-logo" aria-hidden="true" />
          <span class="site-title">Weather Forecast</span>
        </h1>
        <p class="tagline">Reliable local forecasts, wherever you are.</p>
        <div style="display:flex;gap:10px;align-items:center;width:100%;justify-content:center;">
          <form id="searchForm" style="flex:1;display:flex;gap:8px;max-width:640px;">
            <input id="cityInput" placeholder="Enter city (e.g. London)" />
            <button type="submit" class="search-btn">Search</button>
            </form>
            <div style="display:flex;align-items:center;gap:8px">
              <button id="contrastToggle" class="theme-toggle" aria-label="Toggle contrast">⚡</button>
              <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
            </div>
        </div>
      </header>

      <main>
        <section id="current" class="card">Loading...</section>

        <section class="card">
          <h2>24‑Hour Forecast</h2>
          <div id="hourly" class="hourly"></div>
        </section>

        <section class="card days">
          <h2>Next 2 Days</h2>
          <div id="next2" class="next2"></div>
        </section>
        <section class="card weekly">
          <h2>5‑Day Forecast</h2>
          <div id="weekly" class="weekly"></div>
        </section>

        <section class="card map-card">
          <h2>Map</h2>
          <div id="map" style="height:240px;border-radius:8px;overflow:hidden"></div>
        </section>
      </main>

    <script src="/leaflet.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
